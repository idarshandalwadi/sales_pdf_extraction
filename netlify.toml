[build]
  base = "pdf-ui"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Co-locate seed with the function bundle; cwd-based fs read is unreliable in the worker
  included_files = ["netlify/functions/lib/seed-users.json"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
